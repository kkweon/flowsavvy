version: "2"

linters:
  default: standard # errcheck, govet, ineffassign, staticcheck, unused
  exclusions:
    generated: lax
    paths:
      - client/ # generated OpenAPI SDK

formatters:
  enable:
    - gofumpt
    - gci
  settings:
    gci:
      sections:
        - standard # stdlib
        - default # third-party
        - localmodule # github.com/kkweon/flowsavvy (auto-detected)
  exclusions:
    paths:
      - client/
